<script>
        const CHANNEL_NAME = "nur_trading_baza"; 
        let allTrades = [];

        document.addEventListener("DOMContentLoaded", function() {
            fetchFromTelegram();
            setInterval(fetchFromTelegram, 10000); // Проверка каждые 10 секунд
        });

        function fetchFromTelegram() {
            // Используем CORS-прокси для получения постов напрямую из публичного веб-отжета Telegram
            fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://t.me/s/' + CHANNEL_NAME)}&nocache=` + new Date().getTime())
                .then(res => {
                    if (res.ok) return res.json();
                    throw new Error('Ошибка сети');
                })
                .then(data => {
                    const html = data.contents;
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // Находим все текстовые сообщения на канале
                    const messages = doc.querySelectorAll('.tgme_widget_message_text');
                    
                    allTrades = [];
                    messages.forEach(msg => {
                        try {
                            // Очищаем текст от лишних HTML тегов, если они есть
                            const cleanText = msg.innerText.trim();
                            const jsonTrade = JSON.parse(cleanText);
                            allTrades.push(jsonTrade);
                        } catch(e) {
                            // Пропускаем сообщения, если это не JSON
                        }
                    });

                    // Сортируем: новые сделки будут вверху
                    allTrades.reverse();

                    populateAccountFilter();
                    applyFilters();
                })
                .catch(err => console.log("Ожидание обновления данных из Telegram..."));
        }

        function populateAccountFilter() {
            const filter = document.getElementById('account-filter');
            const currentSelection = filter.value;
            const uniqueLogins = [...new Set(allTrades.map(t => t.accountLogin))].filter(Boolean);
            
            filter.innerHTML = '<option value="all">🔍 Все счета (Barcha shotlar)</option>';
            uniqueLogins.forEach(login => {
                filter.innerHTML += `<option value="${login}">MT5: ${login}</option>`;
            });
            filter.value = currentSelection;
        }

        function applyFilters() {
            const accFilter = document.getElementById('account-filter').value;
            const timeFilter = document.getElementById('time-filter').value;
            
            let filtered = allTrades;

            if (accFilter !== 'all') {
                filtered = filtered.filter(t => t.accountLogin && t.accountLogin.toString() === accFilter);
            }

            const now = new Date();
            if (timeFilter === 'today') {
                filtered = filtered.filter(t => new Date(t.closeTime).toDateString() === now.toDateString());
            } else if (timeFilter === 'month') {
                filtered = filtered.filter(t => new Date(t.closeTime).getMonth() === now.getMonth());
            }

            const tbody = document.getElementById('trades-tbody');
            tbody.innerHTML = '';
            
            let totalProfit = 0;
            let wins = 0;

            filtered.forEach(t => {
                totalProfit += t.profit;
                if (t.profit > 0) wins++;

                const dateStr = t.closeTime ? new Date(t.closeTime).toLocaleDateString() : '-';
                const profitClass = t.profit >= 0 ? 'positive' : 'negative';
                const directionText = t.direction || 'BUY';
                const dirClass = (directionText === 'UZUN' || directionText.toUpperCase() === 'BUY') ? 'dir-buy' : 'dir-sell';

                tbody.innerHTML += `
                    <tr>
                        <td>${dateStr}</td>
                        <td><b>${t.symbol || 'XAUUSD'}</b></td>
                        <td><span class="dir-badge ${dirClass}">${directionText}</span></td>
                        <td>${t.duration || 0} m</td>
                        <td><span class="${profitClass}">${t.profit >= 0 ? '+' : ''}${t.profit.toFixed(2)}$</span></td>
                        <td><small style="color:#8c8e9d">MT5: ${t.accountLogin}</small></td>
                    </tr>
                `;
            });

            document.getElementById('trade-count').innerText = `${filtered.length} ta sdelka`;
            document.getElementById('total-result').innerText = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(2) + '$';
            document.getElementById('total-result').className = `stat-value ${totalProfit >= 0 ? 'positive' : 'negative'}`;
            
            const winrate = filtered.length > 0 ? Math.round((wins / filtered.length) * 100) : 0;
            document.getElementById('winrate').innerText = `${winrate}%`;
        }

        document.getElementById('account-filter').addEventListener('change', applyFilters);
        document.getElementById('time-filter').addEventListener('change', applyFilters);
    </script>
